services:
  - type: web
    name: finsentiq
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui/app.py --server.port $PORT --server.headless true --server.enableCORS false --server.enableXsrfProtection false --server.enableWebsocketCompression false
    healthCheckPath: /
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
